<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Request Dashboard</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #f4f6f9;
            --text: #333;
            --border: #ccc;
            --accent: #e67e22;
            --erail-color: #d32f2f;
            --gov-color: #0d47a1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--secondary);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        
        .notification {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
            font-weight: bold;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        label { font-weight: bold; font-size: 12px; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
        
        .btn-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover { opacity: 0.9; }
        .btn-clear { background-color: #7f8c8d; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; font-size: 12px; }
        th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { background-color: var(--primary); color: white; white-space: nowrap; }
        tr:hover { background-color: #f1f1f1; }
        
        .status-select {
            padding: 4px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
        .chk-btn {
            background-color: var(--gov-color);
            color: white;
            padding: 4px 6px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        .erail-btn {
            background-color: var(--erail-color);
            color: white;
            padding: 4px 6px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        .action-btn { background: #dc3545; color: white; padding: 4px 6px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; }
        .div-badge { background: #e0f2f1; color: #004d40; padding: 2px 4px; border-radius: 3px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>EQ Request Master Compilation & Operational Tracker</h2>
    
    <div id="notifBar" class="notification"></div>
    
    <!-- Input Form -->
    <div class="form-group" id="eqForm">
        <div>
            <label>PNR Number</label>
            <input type="text" id="pnr" maxlength="10" placeholder="10 digit PNR">
        </div>
        <div>
            <label>Train Number</label>
            <input type="text" id="trainNo" placeholder="e.g., 12605">
        </div>
        <div>
            <label>Train Name</label>
            <input type="text" id="trainName" placeholder="e.g., Pallavan Exp">
        </div>
        <div>
            <label>Origin Division</label>
            <input type="text" id="originDiv" placeholder="e.g., MAS">
        </div>
        <div>
            <label>Boarding Station</label>
            <input type="text" id="bStation" placeholder="e.g., MS">
        </div>
        <div>
            <label>Journey Date</label>
            <input type="date" id="jDate">
        </div>
        <div>
            <label>Departure Time</label>
            <input type="text" id="depTime" placeholder="e.g., 15:40">
        </div>
        <div>
            <label>Passenger Name</label>
            <input type="text" id="passenger" placeholder="Passenger Name">
        </div>
        <div>
            <label>Charting Station</label>
            <input type="text" id="chartStation" placeholder="e.g., MS">
        </div>
        <div>
            <label>Charting Division</label>
            <input type="text" id="chartDiv" placeholder="e.g., MAS">
        </div>
        <div>
            <label>EQ Status</label>
            <select id="status">
                <option value="Pending">⌛ Pending</option>
                <option value="Confirmed">✅ Confirmed</option>
                <option value="Regret">❌ Regret</option>
            </select>
        </div>
        <div class="btn-panel">
            <button class="btn-clear" onclick="clearForm()">Clear Fields</button>
            <button onclick="addRequest()">Log & Save Request</button>
        </div>
    </div>

    <!-- Data Table -->
    <table id="recordsTable">
        <thead>
            <tr>
                <th>PNR</th>
                <th>Train Details</th>
                <th>Origin Div</th>
                <th>Boarding</th>
                <th>Journey Date</th>
                <th>Departure Time</th>
                <th>Passenger</th>
                <th>Charting Stn</th>
                <th>Charting Div</th>
                <th>Calculated Chart Prep Window</th>
                <th>Route Verification</th>
                <th>Official Live Status</th>
                <th>Allocation State</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Dynamic Content -->
        </tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        parseUrlParameters();
        displayRecords();
    });

    function getRecords() {
        return JSON.parse(localStorage.getItem("eqRecords")) || [];
    }

    function parseUrlParameters() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('pnr')) {
            document.getElementById("pnr").value = params.get('pnr') || '';
            document.getElementById("trainNo").value = params.get('trainNo') || '';
            document.getElementById("trainName").value = params.get('trainName') || '';
            document.getElementById("originDiv").value = params.get('originDiv') || '';
            document.getElementById("bStation").value = params.get('bStation') || '';
            document.getElementById("jDate").value = params.get('jDate') || '';
            document.getElementById("depTime").value = params.get('depTime') || '';
            document.getElementById("passenger").value = params.get('passenger') || '';
            document.getElementById("chartStation").value = params.get('chartStation') || '';
            document.getElementById("chartDiv").value = params.get('chartDiv') || '';
            
            addRequest();
            
            showNotification("Successfully logged dynamic entry from chat!");
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    function showNotification(msg) {
        const bar = document.getElementById("notifBar");
        bar.innerText = msg;
        bar.style.display = "block";
        setTimeout(() => { bar.style.display = "none"; }, 5000);
    }

    function calculateChartPrepTime(depTimeStr) {
        if (!depTimeStr || depTimeStr === 'Not Set') return 'Awaiting Route Data';
        const timeParts = depTimeStr.trim().split(':');
        if (timeParts.length < 2) return 'Invalid Format';
        
        const hours = parseInt(timeParts[0], 10);
        const minutes = parseInt(timeParts[1], 10);
        if (isNaN(hours) || isNaN(minutes)) return 'Invalid Data';

        if (hours >= 5 && hours < 14) {
            return 'Prev Day by 21:00 hrs';
        }
        
        let targetHours = hours - 10;
        let dayContext = 'Same Day';
        if (targetHours < 0) {
            targetHours = 24 + targetHours;
            dayContext = 'Prev Day';
        }
        
        return `${dayContext} at ${String(targetHours).padStart(2, '0')}:${String(minutes).padStart(2, '0')} hrs`;
    }

    function addRequest() {
        const pnr = document.getElementById("pnr").value;
        const trainNo = document.getElementById("trainNo").value;
        const trainName = document.getElementById("trainName").value;
        const originDiv = document.getElementById("originDiv").value.toUpperCase();
        const bStation = document.getElementById("bStation").value.toUpperCase();
        const jDate = document.getElementById("jDate").value;
        const depTime = document.getElementById("depTime").value;
        const passenger = document.getElementById("passenger").value;
        const chartStation = document.getElementById("chartStation").value.toUpperCase();
        const chartDiv = document.getElementById("chartDiv").value.toUpperCase();
        const status = document.getElementById("status").value;

        if (!pnr || pnr.length !== 10) { alert("Please input a valid 10-digit PNR."); return; }

        const records = getRecords();
        records.unshift({ pnr, trainNo, trainName, originDiv, bStation, jDate, depTime, passenger, chartStation, chartDiv, status });
        localStorage.setItem("eqRecords", JSON.stringify(records));

        clearForm();
        displayRecords();
    }

    function clearForm() {
        document.getElementById("pnr").value = '';
        document.getElementById("trainNo").value = '';
        document.getElementById("trainName").value = '';
        document.getElementById("originDiv").value = '';
        document.getElementById("bStation").value = '';
        document.getElementById("jDate").value = '';
        document.getElementById("depTime").value = '';
        document.getElementById("passenger").value = '';
        document.getElementById("chartStation").value = '';
        document.getElementById("chartDiv").value = '';
    }

    // REDIRECTS NATIVELY TO THE OFFICIAL INDIAN RAILWAYS GATEWAY SYSTEM WITH AUTOMATIC CLIPBOARD ASSIGNMENT
    function checkPnrOfficialGov(pnrNum) {
        navigator.clipboard.writeText(pnrNum).then(() => {
            alert("PNR " + pnrNum + " copied to clipboard!\n\nOpening official Indian Railways Enquiry portal. Simply paste (Ctrl+V) the number into the verification box.");
            window.open("https://www.indianrail.gov.in/enquiry/PNR/PnrEnquiry.html?locale=en", "_blank");
        }).catch(err => {
            // Fallback strategy if clipboard permissions are blocked by the browser context
            alert("Opening official Indian Railways portal.\nYour target PNR is: " + pnrNum);
            window.open("https://www.indianrail.gov.in/enquiry/PNR/PnrEnquiry.html?locale=en", "_blank");
        });
    }

    function openErailEnquiry(trainNo) {
        alert("Opening eRail Train Enquiry.\nSearch Train: " + trainNo + "\nVerify the Originating Division and preceding (RL) Remote Location station data.");
        window.open("https://erail.in/train-enquiry", "_blank");
    }

    function formatDateToIndian(dateStr) {
        if(!dateStr) return "N/A";
        const parts = dateStr.split('-');
        return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : dateStr;
    }

    function updateStatus(index, newStatus) {
        const records = getRecords();
        records[index].status = newStatus;
        localStorage.setItem("eqRecords", JSON.stringify(records));
        displayRecords();
    }

    function deleteRecord(index) {
        if(confirm("Permanently delete this entry?")) {
            const records = getRecords();
            records.splice(index, 1);
            localStorage.setItem("eqRecords", JSON.stringify(records));
            displayRecords();
        }
    }

    function displayRecords() {
        const records = getRecords();
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        records.forEach((record, index) => {
            const calculatedWindow = calculateChartPrepTime(record.depTime);
            
            const row = `<tr>
                <td><strong>${record.pnr}</strong></td>
                <td><strong>${record.trainNo}</strong> - ${record.trainName || ''}</td>
                <td><span class="div-badge">${record.originDiv || 'N/A'}</span></td>
                <td><b>${record.bStation || 'N/A'}</b></td>
                <td>${formatDateToIndian(record.jDate)}</td>
                <td>⏱️ <b>${record.depTime || 'N/A'}</b></td>
                <td>${record.passenger}</td>
                <td><b>${record.chartStation || 'PENDING'}</b></td>
                <td><span class="div-badge">${record.chartDiv || 'PENDING'}</span></td>
                <td style="color:#2e7d32; font-weight:bold;">📋 ${calculatedWindow}</td>
                <td>
                    <button class="erail-btn" onclick="openErailEnquiry('${record.trainNo}')">🔍 eRail</button>
                </td>
                <td>
                    <button class="chk-btn" onclick="checkPnrOfficialGov('${record.pnr}')">🏛️ Live Gov Status</button>
                </td>
                <td>
                    <select class="status-select" onchange="updateStatus(${index}, this.value)">
                        <option value="Pending" ${record.status === 'Pending' ? 'selected' : ''}>⌛ Pending</option>
                        <option value="Confirmed" ${record.status === 'Confirmed' ? 'selected' : ''}>✅ Confirmed</option>
                        <option value="Regret" ${record.status === 'Regret' ? 'selected' : ''}>❌ Regret</option>
                    </select>
                </td>
                <td>
                    <button class="action-btn" onclick="deleteRecord(${index})">Delete</button>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
</script>
</body>
</html>
