<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Request Dashboard</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #f4f6f9;
            --text: #333;
            --border: #ccc;
            --accent: #e67e22;
            --irctc-color: #2e7d32;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--secondary);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1350px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        
        .notification {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
            font-weight: bold;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        label { font-weight: bold; font-size: 13px; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 4px; }
        
        .btn-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .btn-clear { background-color: #7f8c8d; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); }
        th { background-color: var(--primary); color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .status-select {
            padding: 4px;
            border-radius: 4px;
            font-weight: bold;
        }
        .chk-btn {
            background-color: var(--accent);
            color: white;
            padding: 5px 8px;
            font-size: 11px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .irctc-btn {
            background-color: var(--irctc-color);
            color: white;
            padding: 5px 8px;
            font-size: 11px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            text-align: center;
            border: none;
            cursor: pointer;
        }
        .action-btn { background: #dc3545; color: white; padding: 5px 8px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>EQ Request Master Compilation & Operational Tracker</h2>
    
    <div id="notifBar" class="notification"></div>
    
    <!-- Input Form -->
    <div class="form-group" id="eqForm">
        <div>
            <label>PNR Number</label>
            <input type="text" id="pnr" maxlength="10" placeholder="10 digit PNR">
        </div>
        <div>
            <label>Train Number</label>
            <input type="text" id="trainNo" placeholder="e.g., 12605">
        </div>
        <div>
            <label>Train Name</label>
            <input type="text" id="trainName" placeholder="e.g., Pallavan Exp">
        </div>
        <div>
            <label>Boarding Station Code</label>
            <input type="text" id="bStation" placeholder="e.g., MS">
        </div>
        <div>
            <label>Journey Date</label>
            <input type="date" id="jDate">
        </div>
        <div>
            <label>Passenger Name</label>
            <input type="text" id="passenger" placeholder="Name">
        </div>
        <div>
            <label>IRCTC Check Date</label>
            <input type="date" id="irctcDate">
        </div>
        <div>
            <label>EQ Status</label>
            <select id="status">
                <option value="Pending">⌛ Pending</option>
                <option value="Confirmed">✅ Confirmed</option>
                <option value="Regret">❌ Regret</option>
            </select>
        </div>
        <div class="btn-panel">
            <button class="btn-clear" onclick="clearForm()">Clear Fields</button>
            <button onclick="addRequest()">Log & Save Request</button>
        </div>
    </div>

    <!-- Data Table -->
    <table id="recordsTable">
        <thead>
            <tr>
                <th>PNR</th>
                <th>Train Details</th>
                <th>Boarding</th>
                <th>Journey Date</th>
                <th>Passenger</th>
                <th>IRCTC Target Date</th>
                <th>IRCTC Charts Portal Lookup</th>
                <th>Live Status</th>
                <th>Allocation State</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Dynamic Content -->
        </tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        parseUrlParameters();
        displayRecords();
    });

    function getRecords() {
        return JSON.parse(localStorage.getItem("eqRecords")) || [];
    }

    function parseUrlParameters() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('pnr')) {
            const pnr = params.get('pnr') || '';
            const trainNo = params.get('trainNo') || '';
            const trainName = params.get('trainName') || '';
            const bStation = params.get('bStation') || '';
            const jDate = params.get('jDate') || '';
            const passenger = params.get('passenger') || '';
            
            document.getElementById("pnr").value = pnr;
            document.getElementById("trainNo").value = trainNo;
            document.getElementById("trainName").value = trainName;
            document.getElementById("bStation").value = bStation;
            document.getElementById("jDate").value = jDate;
            document.getElementById("passenger").value = passenger;

            // CALCULATE PREVIOUS DAY DYNAMICALLY FOR THE IRCTC LOOKUP FIELD
            if (jDate) {
                const dateObj = new Date(jDate);
                dateObj.setDate(dateObj.getDate() - 1);
                const prevDayStr = dateObj.toISOString().split('T')[0];
                document.getElementById("irctcDate").value = prevDayStr;
            }
            
            addRequest();
            
            showNotification("Successfully logged dynamic entry from chat!");
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    function showNotification(msg) {
        const bar = document.getElementById("notifBar");
        bar.innerText = msg;
        bar.style.display = "block";
        setTimeout(() => { bar.style.display = "none"; }, 5000);
    }

    function addRequest() {
        const pnr = document.getElementById("pnr").value;
        const trainNo = document.getElementById("trainNo").value;
        const trainName = document.getElementById("trainName").value;
        const bStation = document.getElementById("bStation").value.toUpperCase();
        const jDate = document.getElementById("jDate").value;
        const passenger = document.getElementById("passenger").value;
        const irctcDate = document.getElementById("irctcDate").value;
        const status = document.getElementById("status").value;

        if (!pnr || pnr.length !== 10) { alert("Please input a valid 10-digit PNR."); return; }

        const records = getRecords();
        records.unshift({ pnr, trainNo, trainName, bStation, jDate, passenger, irctcDate, status });
        localStorage.setItem("eqRecords", JSON.stringify(records));

        clearForm();
        displayRecords();
    }

    function clearForm() {
        document.getElementById("pnr").value = '';
        document.getElementById("trainNo").value = '';
        document.getElementById("trainName").value = '';
        document.getElementById("bStation").value = '';
        document.getElementById("jDate").value = '';
        document.getElementById("passenger").value = '';
        document.getElementById("irctcDate").value = '';
    }

    function checkPnrLive(pnrNum) {
        navigator.clipboard.writeText(pnrNum).then(() => {
            alert("PNR " + pnrNum + " copied to clipboard! Opening verification portal...");
            window.open("https://www.confirmtkt.com/pnr-status/" + pnrNum, "_blank");
        });
    }

    // HELPER FORMATTER TO CONVERT YYYY-MM-DD TO DD-MM-YYYY FOR IRCTC MANUAL SYSTEM
    function formatDateToIndian(dateStr) {
        if(!dateStr) return "N/A";
        const parts = dateStr.split('-');
        if(parts.length !== 3) return dateStr;
        return `${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    function openIrctcCharts(trainNo, bStation, irctcDate) {
        const displayDate = formatDateToIndian(irctcDate);
        alert("REDIRECTING TO OFFICIAL IRCTC CHARTS\n\nUse these parameters to lookup:\n• Train Number: " + trainNo + "\n• Boarding Station: " + bStation + "\n• Journey Date: " + displayDate);
        window.open("https://www.irctc.co.in/online-charts/", "_blank");
    }

    function updateStatus(index, newStatus) {
        const records = getRecords();
        records[index].status = newStatus;
        localStorage.setItem("eqRecords", JSON.stringify(records));
        displayRecords();
    }

    function deleteRecord(index) {
        if(confirm("Permanently delete this entry?")) {
            const records = getRecords();
            records.splice(index, 1);
            localStorage.setItem("eqRecords", JSON.stringify(records));
            displayRecords();
        }
    }

    function displayRecords() {
        const records = getRecords();
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        records.forEach((record, index) => {
            const displayTargetDate = formatDateToIndian(record.irctcDate);
            const row = `<tr>
                <td><strong>${record.pnr}</strong></td>
                <td><strong>${record.trainNo}</strong> - ${record.trainName || ''}</td>
                <td><mark><b>${record.bStation || 'N/A'}</b></mark></td>
                <td>${formatDateToIndian(record.jDate)}</td>
                <td>${record.passenger}</td>
                <td>📅 <b style="color:var(--irctc-color);">${displayTargetDate}</b></td>
                <td>
                    <button class="irctc-btn" onclick="openIrctcCharts('${record.trainNo}', '${record.bStation}', '${record.irctcDate}')">🌐 Open Chart Details</button>
                </td>
                <td>
                    <button class="chk-btn" onclick="checkPnrLive('${record.pnr}')">⚡ Verify Status</button>
                </td>
                <td>
                    <select class="status-select" onchange="updateStatus(${index}, this.value)">
                        <option value="Pending" ${record.status === 'Pending' ? 'selected' : ''}>⌛ Pending</option>
                        <option value="Confirmed" ${record.status === 'Confirmed' ? 'selected' : ''}>✅ Confirmed</option>
                        <option value="Regret" ${record.status === 'Regret' ? 'selected' : ''}>❌ Regret</option>
                    </select>
                </td>
                <td>
                    <button class="action-btn" onclick="deleteRecord(${index})">Delete</button>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
</script>
</body>
</html>
