<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Request Dashboard</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #f4f6f9;
            --text: #333;
            --border: #ccc;
            --accent: #e67e22;
            --gov-color: #0d47a1;
            --cloud-color: #43a047;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--secondary);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1550px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        
        .notification {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
            font-weight: bold;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        label { font-weight: bold; font-size: 12px; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
        
        .btn-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover { opacity: 0.9; }
        .btn-clear { background-color: #7f8c8d; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; font-size: 12px; }
        th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { background-color: var(--primary); color: white; white-space: nowrap; }
        tr:hover { background-color: #f1f1f1; }
        
        .status-select {
            padding: 4px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
        .chk-btn {
            background-color: var(--gov-color);
            color: white;
            padding: 4px 6px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        .action-btn { background: #dc3545; color: white; padding: 4px 6px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; }
        .div-badge { background: #e0f2f1; color: #004d40; padding: 2px 4px; border-radius: 3px; font-weight: bold; font-size: 11px; }
        .sync-indicator { font-size: 11px; color: var(--cloud-color); font-weight: bold; float: right; margin-top: 5px;}
    </style>

    <!-- FIREBASE PLATFORM CLIENT SDK MODULES -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="container">
    <span class="sync-indicator">🟢 Real-Time Cloud Sync Active</span>
    <h2>EQ Request Master Compilation & Real-Time Cloud Tracker</h2>
    
    <div id="notifBar" class="notification"></div>
    
    <!-- Input Form -->
    <div class="form-group" id="eqForm">
        <div>
            <label>PNR Number</label>
            <input type="text" id="pnr" maxlength="10" placeholder="10 digit PNR">
        </div>
        <div>
            <label>Train Number</label>
            <input type="text" id="trainNo" placeholder="e.g., 12605">
        </div>
        <div>
            <label>Train Name</label>
            <input type="text" id="trainName" placeholder="e.g., Pallavan Exp">
        </div>
        <div>
            <label>Origin Division</label>
            <input type="text" id="originDiv" placeholder="e.g., MAS">
        </div>
        <div>
            <label>Boarding Station</label>
            <input type="text" id="bStation" placeholder="e.g., MS">
        </div>
        <div>
            <label>Journey Date</label>
            <input type="date" id="jDate">
        </div>
        <div>
            <label>Boarding Dep. Time</label>
            <input type="text" id="depTime" placeholder="e.g., 15:40">
        </div>
        <div>
            <label>Passenger Name</label>
            <input type="text" id="passenger" placeholder="Passenger Name">
        </div>
        <div>
            <label>Charting Station</label>
            <input type="text" id="chartStation" placeholder="e.g., MS">
        </div>
        <div>
            <label>Charting Division</label>
            <input type="text" id="chartDiv" placeholder="e.g., MAS">
        </div>
        <div>
            <label>Charting Dep. Time</label>
            <input type="text" id="chartDepTime" placeholder="e.g., 15:40">
        </div>
        <div>
            <label>EQ Status</label>
            <select id="status">
                <option value="Pending">⌛ Pending</option>
                <option value="Confirmed">✅ Confirmed</option>
                <option value="Regret">❌ Regret</option>
            </select>
        </div>
        <div class="btn-panel">
            <button class="btn-clear" onclick="clearForm()">Clear Fields</button>
            <button onclick="handleManualSubmit()">Log & Save Request</button>
        </div>
    </div>

    <!-- Data Table -->
    <table id="recordsTable">
        <thead>
            <tr>
                <th>S.No</th>
                <th>PNR</th>
                <th>Train Details</th>
                <th>Origin Div</th>
                <th>Boarding</th>
                <th>Journey Date</th>
                <th>Boarding Dep</th>
                <th>Passenger</th>
                <th>Charting Stn</th>
                <th>Charting Div</th>
                <th>Charting Dep</th>
                <th>Calculated Chart Prep Time</th>
                <th>Official Live Status</th>
                <th>Allocation State</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Cloud Synchronized Rows -->
        </tbody>
    </table>
</div>

<script>
    // YOUR COPIED CONFIGURATION KEYS LINKED DIRECTLY TO YOUR SERVER INSTANCE
    const firebaseConfig = {
        apiKey: "AIzaSyCkNA0lawZPrHMg59whHSgIji3ulXq_Wmg",
        authDomain: "eq-tracker-83c3c.firebaseapp.com",
        databaseURL: "https://eq-tracker-83c3c-default-rtdb.firebaseio.com",
        projectId: "eq-tracker-83c3c",
        storageBucket: "eq-tracker-83c3c.firebasestorage.app",
        messagingSenderId: "788786262975",
        appId: "1:788786262975:web:15a8dd05887271adcf670a",
        measurementId: "G-XV1MH0Z1HC"
    };

    // Initialize Connection Framework
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.addEventListener("DOMContentLoaded", () => {
        parseUrlParameters();
        listenToCloudSync();
    });

    function parseUrlParameters() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('pnr')) {
            const record = {
                pnr: params.get('pnr') || '',
                trainNo: params.get('trainNo') || '',
                trainName: params.get('trainName') || '',
                originDiv: params.get('originDiv') || '',
                bStation: params.get('bStation') || '',
                jDate: params.get('jDate') || '',
                depTime: params.get('depTime') || '',
                passenger: params.get('passenger') || '',
                chartStation: params.get('chartStation') || '',
                chartDiv: params.get('chartDiv') || '',
                chartDepTime: params.get('chartDepTime') || '',
                status: 'Pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            if (record.pnr.length === 10) {
                db.collection("eq_requests").doc(record.pnr).set(record)
                .then(() => {
                    showNotification("Successfully synced dynamic entry to the Cloud stream!");
                }).catch(err => console.error("Write error: ", err));
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    function listenToCloudSync() {
        db.collection("eq_requests").orderBy("timestamp", "desc")
        .onSnapshot((snapshot) => {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            let idx = 1;
            
            snapshot.forEach((doc) => {
                const record = doc.data();
                const calculatedWindow = calculateChartPrepTime(record.chartDepTime);
                
                const row = `<tr>
                    <td style="text-align: center; font-weight: bold; color: #555;">${idx++}</td>
                    <td><strong>${record.pnr}</strong></td>
                    <td><strong>${record.trainNo}</strong> - ${record.trainName || ''}</td>
                    <td><span class="div-badge">${record.originDiv || 'N/A'}</span></td>
                    <td><b>${record.bStation || 'N/A'}</b></td>
                    <td>${formatDateToIndian(record.jDate)}</td>
                    <td>⏱️ <b>${record.depTime || 'N/A'}</b></td>
                    <td>${record.passenger}</td>
                    <td><b>${record.chartStation || 'PENDING'}</b></td>
                    <td><span class="div-badge">${record.chartDiv || 'PENDING'}</span></td>
                    <td>⏱️ <b>${record.chartDepTime || 'PENDING'}</b></td>
                    <td style="color:#2e7d32; font-weight:bold;">📋 ${calculatedWindow}</td>
                    <td>
                        <button class="chk-btn" onclick="checkPnrOfficialGov('${record.pnr}')">🏛️ Live Gov Status</button>
                    </td>
                    <td>
                        <select class="status-select" onchange="updateCloudStatus('${record.pnr}', this.value)">
                            <option value="Pending" ${record.status === 'Pending' ? 'selected' : ''}>⌛ Pending</option>
                            <option value="Confirmed" ${record.status === 'Confirmed' ? 'selected' : ''}>✅ Confirmed</option>
                            <option value="Regret" ${record.status === 'Regret' ? 'selected' : ''}>❌ Regret</option>
                        </select>
                    </td>
                    <td>
                        <button class="action-btn" onclick="deleteCloudRecord('${record.pnr}')">Delete</button>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }, (error) => {
            console.error("Cloud listener error: ", error);
        });
    }

    function handleManualSubmit() {
        const pnr = document.getElementById("pnr").value;
        if (pnr.length !== 10) { alert("Please input a valid 10-digit PNR."); return; }

        const record = {
            pnr: pnr,
            trainNo: document.getElementById("trainNo").value,
            trainName: document.getElementById("trainName").value,
            originDiv: document.getElementById("originDiv").value.toUpperCase(),
            bStation: document.getElementById("bStation").value.toUpperCase(),
            jDate: document.getElementById("jDate").value,
            depTime: document.getElementById("depTime").value,
            passenger: document.getElementById("passenger").value,
            chartStation: document.getElementById("chartStation").value.toUpperCase(),
            chartDiv: document.getElementById("chartDiv").value.toUpperCase(),
            chartDepTime: document.getElementById("chartDepTime").value,
            status: document.getElementById("status").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection("eq_requests").doc(pnr).set(record).then(() => {
            clearForm();
            showNotification("Manual entry saved to cloud.");
        });
    }

    function updateCloudStatus(pnr, newStatus) {
        db.collection("eq_requests").doc(pnr).update({ status: newStatus });
    }

    // HANDLES INSTANT REMOVAL ACROSS ALL ONLINE INSTANCES
    function deleteCloudRecord(pnr) {
        if (confirm("Permanently delete this cloud entry?")) {
            db.collection("eq_requests").doc(pnr).delete();
        }
    }

    function calculateChartPrepTime(chartDepTimeStr) {
        if (!chartDepTimeStr || chartDepTimeStr === 'Not Set' || chartDepTimeStr === 'PENDING') return 'Awaiting Chart Dep Time';
        const timeParts = chartDepTimeStr.trim().split(':');
        if (timeParts.length < 2) return 'Invalid Format';
        
        const hours = parseInt(timeParts[0], 10);
        const minutes = parseInt(timeParts[1], 10);
        
        // RULE 1: Charting station departure is between 05:00 hrs and 14:00 hrs
        if (hours >= 5 && hours < 14) {
            return 'Prev Day by 21:00 hrs';
        }
        
        // RULE 2: Charting station departure is between 14:00 hrs to 05:00 hrs (10 Hours Before)
        let targetHours = hours - 10;
        let dayContext = 'Same Day';
        if (targetHours < 0) {
            targetHours = 24 + targetHours;
            dayContext = 'Prev Day';
        }
        return `${dayContext} at ${String(targetHours).padStart(2, '0')}:${String(minutes).padStart(2, '0')} hrs`;
    }

    function clearForm() {
        document.getElementById("pnr").value = ''; document.getElementById("trainNo").value = '';
        document.getElementById("trainName").value = ''; document.getElementById("originDiv").value = '';
        document.getElementById("bStation").value = ''; document.getElementById("jDate").value = '';
        document.getElementById("depTime").value = ''; document.getElementById("passenger").value = '';
        document.getElementById("chartStation").value = ''; document.getElementById("chartDiv").value = '';
        document.getElementById("chartDepTime").value = '';
    }

    function checkPnrOfficialGov(pnrNum) {
        navigator.clipboard.writeText(pnrNum).then(() => {
            alert("PNR " + pnrNum + " copied to clipboard!\n\nOpening official Indian Railways Enquiry portal. Simply paste (Ctrl+V) the number into the verification box.");
            window.open("https://www.indianrail.gov.in/enquiry/PNR/PnrEnquiry.html?locale=en", "_blank");
        });
    }

    function formatDateToIndian(dateStr) {
        if(!dateStr) return "N/A";
        const parts = dateStr.split('-');
        return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : dateStr;
    }

    function showNotification(msg) {
        const bar = document.getElementById("notifBar");
        bar.innerText = msg; bar.style.display = "block";
        setTimeout(() => { bar.style.display = "none"; }, 5000);
    }
</script>
</body>
</html>
